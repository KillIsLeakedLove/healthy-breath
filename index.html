<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Healthy Breath - 箱式呼吸法</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 背景粒子 -->
  <div class="particles" id="particles"></div>

  <!-- 呼吸波纹 -->
  <div class="ripple-bg">
    <div class="ripple-ring"></div>
    <div class="ripple-ring"></div>
    <div class="ripple-ring"></div>
  </div>

  <!-- 庆祝动画 -->
  <div class="celebration" id="celebration"></div>

  <div class="container">
    <h1>Healthy Breath</h1>
    <p class="subtitle">箱式呼吸法 · 放松身心</p>

    <div class="breath-stage">
      <svg class="ring-track" viewBox="0 0 280 280">
        <circle cx="140" cy="140" r="135"/>
        <defs>
          <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4a7a5a"/>
            <stop offset="100%" stop-color="#6a9a7a"/>
          </linearGradient>
        </defs>
      </svg>
      <svg class="ring-progress" viewBox="0 0 280 280">
        <circle cx="140" cy="140" r="135"/>
      </svg>
      <div class="breath-circle" id="breathCircle"></div>
      <div class="breath-label" id="breathLabel">准备</div>
    </div>

    <div class="timer" id="timer">--</div>

    <div class="phase-dots">
      <div class="phase-dot"></div>
      <div class="phase-dot"></div>
      <div class="phase-dot"></div>
      <div class="phase-dot"></div>
    </div>

    <div class="controls">
      <div class="settings-row">
        <div class="setting-item">
          <label for="cycleSelect">循环</label>
          <select id="cycleSelect">
            <option value="3">3 次</option>
            <option value="5" selected>5 次</option>
            <option value="10">10 次</option>
            <option value="15">15 次</option>
            <option value="20">20 次</option>
            <option value="30">30 次</option>
            <option value="999">无限</option>
          </select>
        </div>
        <div class="setting-item">
          <label class="toggle-sound">
            <input type="checkbox" id="soundToggle" checked>
            <span>音效</span>
          </label>
        </div>
      </div>

      <button class="btn btn-start" id="actionBtn">开始</button>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="elapsedStat">00:00</div>
        <div class="stat-label">已用时</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="cycleInfo">-</div>
        <div class="stat-label">进度</div>
      </div>
    </div>

    <div class="instruction-card">
      <h3>箱式呼吸法 (4-4-4-4)</h3>
      <div class="breath-flow">
        <div class="flow-step">
          <div class="step-icon">吸</div>
          <div class="step-name">4秒</div>
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">
          <div class="step-icon">屏</div>
          <div class="step-name">4秒</div>
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">
          <div class="step-icon">呼</div>
          <div class="step-name">4秒</div>
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">
          <div class="step-icon">屏</div>
          <div class="step-name">4秒</div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>
    (function initParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = 2 + Math.random() * 4;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDuration = (8 + Math.random() * 12) + 's';
        p.style.animationDelay = (Math.random() * 10) + 's';
        container.appendChild(p);
      }
    })();
  </script>
</body>
</html>
