<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Healthy Breath - 箱式呼吸法</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a3a2f 0%, #2d5a4a 25%, #3d7a6a 50%, #2d5a4a 75%, #1a3a2f 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      color: #e8f5e9;
      overflow: hidden;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 500px;
      width: 100%;
    }

    h1 {
      font-size: 2rem;
      font-weight: 300;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #c8e6c9;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #a5d6a7;
      margin-bottom: 3rem;
      opacity: 0.8;
    }

    .breath-circle-wrapper {
      position: relative;
      width: 260px;
      height: 260px;
      margin: 0 auto 3rem;
    }

    .breath-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(165, 214, 167, 0.9), rgba(129, 199, 132, 0.6), rgba(102, 187, 106, 0.3));
      box-shadow:
        0 0 40px rgba(129, 199, 132, 0.3),
        0 0 80px rgba(129, 199, 132, 0.15),
        inset 0 0 30px rgba(255, 255, 255, 0.1);
      transition: none;
    }

    .breath-circle.inhale {
      animation: inhale 4s ease-in-out forwards;
    }

    .breath-circle.hold {
      animation: hold 4s linear forwards;
    }

    .breath-circle.exhale {
      animation: exhale 4s ease-in-out forwards;
    }

    .breath-circle.hold-empty {
      animation: holdEmpty 4s linear forwards;
    }

    @keyframes inhale {
      from { width: 120px; height: 120px; box-shadow: 0 0 40px rgba(129, 199, 132, 0.3), 0 0 80px rgba(129, 199, 132, 0.15); }
      to { width: 220px; height: 220px; box-shadow: 0 0 60px rgba(165, 214, 167, 0.5), 0 0 120px rgba(165, 214, 167, 0.25); }
    }

    @keyframes hold {
      from { width: 220px; height: 220px; box-shadow: 0 0 60px rgba(165, 214, 167, 0.5), 0 0 120px rgba(165, 214, 167, 0.25); }
      to { width: 220px; height: 220px; box-shadow: 0 0 60px rgba(165, 214, 167, 0.5), 0 0 120px rgba(165, 214, 167, 0.25); }
    }

    @keyframes exhale {
      from { width: 220px; height: 220px; box-shadow: 0 0 60px rgba(165, 214, 167, 0.5), 0 0 120px rgba(165, 214, 167, 0.25); }
      to { width: 120px; height: 120px; box-shadow: 0 0 40px rgba(129, 199, 132, 0.3), 0 0 80px rgba(129, 199, 132, 0.15); }
    }

    @keyframes holdEmpty {
      from { width: 120px; height: 120px; box-shadow: 0 0 40px rgba(129, 199, 132, 0.3), 0 0 80px rgba(129, 199, 132, 0.15); }
      to { width: 120px; height: 120px; box-shadow: 0 0 40px rgba(129, 199, 132, 0.3), 0 0 80px rgba(129, 199, 132, 0.15); }
    }

    .breath-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 4px;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
      z-index: 10;
      pointer-events: none;
    }

    .timer {
      font-size: 3rem;
      font-weight: 200;
      color: #c8e6c9;
      margin-top: 0.5rem;
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      align-items: center;
    }

    .cycle-control {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(255, 255, 255, 0.08);
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    .cycle-control label {
      font-size: 0.95rem;
      color: #a5d6a7;
    }

    .cycle-control select {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      color: #e8f5e9;
      font-size: 1rem;
      cursor: pointer;
      outline: none;
    }

    .cycle-control select option {
      background: #2d5a4a;
      color: #e8f5e9;
    }

    .cycle-control select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn {
      padding: 0.9rem 3rem;
      font-size: 1.1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 2px;
      font-weight: 400;
    }

    .btn-start {
      background: linear-gradient(135deg, #66bb6a, #43a047);
      color: #fff;
      box-shadow: 0 4px 20px rgba(67, 160, 71, 0.3);
    }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(67, 160, 71, 0.4);
    }

    .btn-pause {
      background: linear-gradient(135deg, #ffa726, #f57c00);
      color: #fff;
      box-shadow: 0 4px 20px rgba(245, 124, 0, 0.3);
    }

    .btn-pause:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(245, 124, 0, 0.4);
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin-top: 2rem;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #81c784, #66bb6a);
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .cycle-info {
      font-size: 0.85rem;
      color: #a5d6a7;
      margin-top: 0.75rem;
      opacity: 0.7;
    }

    .instruction {
      margin-top: 2rem;
      padding: 1rem 1.5rem;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      font-size: 0.85rem;
      color: #a5d6a7;
      line-height: 1.6;
      text-align: left;
    }

    .instruction strong {
      color: #c8e6c9;
      display: block;
      margin-bottom: 0.3rem;
      text-align: center;
    }

    .instruction ul {
      list-style: none;
      padding: 0;
      text-align: center;
    }

    .instruction li {
      margin: 0.2rem 0;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.6rem; }
      .breath-circle-wrapper { width: 220px; height: 220px; }
      .breath-label { font-size: 1.2rem; }
      .timer { font-size: 2.5rem; }
      .btn { padding: 0.8rem 2.5rem; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Healthy Breath</h1>
    <p class="subtitle">箱式呼吸法 · 放松身心</p>

    <div class="breath-circle-wrapper">
      <div class="breath-circle" id="breathCircle"></div>
      <div class="breath-label" id="breathLabel">准备</div>
    </div>

    <div class="timer" id="timer">--</div>

    <div class="controls">
      <div class="cycle-control">
        <label for="cycleSelect">循环次数</label>
        <select id="cycleSelect">
          <option value="3">3 次</option>
          <option value="5" selected>5 次</option>
          <option value="10">10 次</option>
          <option value="15">15 次</option>
          <option value="20">20 次</option>
          <option value="30">30 次</option>
          <option value="999">无限</option>
        </select>
      </div>

      <button class="btn btn-start" id="actionBtn">开始</button>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <p class="cycle-info" id="cycleInfo"></p>

    <div class="instruction">
      <strong>箱式呼吸法 (4-4-4-4)</strong>
      <ul>
        <li>吸气 4 秒 &rarr; 屏息 4 秒 &rarr; 呼气 4 秒 &rarr; 屏息 4 秒</li>
      </ul>
    </div>
  </div>

  <script>
    const breathCircle = document.getElementById('breathCircle');
    const breathLabel = document.getElementById('breathLabel');
    const timer = document.getElementById('timer');
    const actionBtn = document.getElementById('actionBtn');
    const cycleSelect = document.getElementById('cycleSelect');
    const progressFill = document.getElementById('progressFill');
    const cycleInfo = document.getElementById('cycleInfo');

    let isRunning = false;
    let isPaused = false;
    let currentCycle = 0;
    let totalCycles = 5;
    let currentPhase = 0;
    let countdownInterval = null;
    let phaseTimeout = null;
    let phaseStartTime = 0;
    let remainingPhaseTime = 0;

    const phases = [
      { name: '吸气', class: 'inhale', duration: 4000 },
      { name: '屏息', class: 'hold', duration: 4000 },
      { name: '呼气', class: 'exhale', duration: 4000 },
      { name: '屏息', class: 'hold-empty', duration: 4000 }
    ];

    function updateCountdown(duration, startTime) {
      const elapsed = Date.now() - startTime;
      const remaining = Math.max(0, Math.ceil((duration - elapsed) / 1000));
      timer.textContent = remaining;
    }

    function clearAllAnimations() {
      breathCircle.classList.remove('inhale', 'hold', 'exhale', 'hold-empty');
    }

    function runPhase() {
      if (!isRunning || isPaused) return;

      if (currentPhase >= phases.length) {
        currentPhase = 0;
        currentCycle++;

        if (totalCycles !== 999 && currentCycle >= totalCycles) {
          finishSession();
          return;
        }
      }

      const phase = phases[currentPhase];
      clearAllAnimations();

      // Force reflow
      void breathCircle.offsetWidth;

      breathCircle.classList.add(phase.class);
      breathLabel.textContent = phase.name;
      updateProgress();

      phaseStartTime = Date.now();
      timer.textContent = '4';

      countdownInterval = setInterval(() => {
        updateCountdown(phase.duration, phaseStartTime);
      }, 100);

      phaseTimeout = setTimeout(() => {
        clearInterval(countdownInterval);
        currentPhase++;
        runPhase();
      }, phase.duration);
    }

    function updateProgress() {
      if (totalCycles === 999) {
        progressFill.style.width = '0%';
        cycleInfo.textContent = `已完成 ${currentCycle} 次`;
        return;
      }
      const phaseProgress = currentPhase / phases.length;
      const cycleProgress = (currentCycle + phaseProgress) / totalCycles;
      progressFill.style.width = `${Math.min(cycleProgress * 100, 100)}%`;
      cycleInfo.textContent = `${currentCycle + 1} / ${totalCycles} 次`;
    }

    function startSession() {
      isRunning = true;
      isPaused = false;
      currentCycle = 0;
      currentPhase = 0;
      totalCycles = parseInt(cycleSelect.value);
      cycleSelect.disabled = true;
      actionBtn.textContent = '暂停';
      actionBtn.classList.remove('btn-start');
      actionBtn.classList.add('btn-pause');
      runPhase();
    }

    function pauseSession() {
      isPaused = true;
      clearInterval(countdownInterval);
      clearTimeout(phaseTimeout);
      remainingPhaseTime = phases[currentPhase].duration - (Date.now() - phaseStartTime);
      actionBtn.textContent = '继续';
      breathLabel.textContent = '已暂停';
    }

    function resumeSession() {
      isPaused = false;
      actionBtn.textContent = '暂停';
      breathLabel.textContent = phases[currentPhase].name;
      phaseStartTime = Date.now() - (phases[currentPhase].duration - remainingPhaseTime);

      countdownInterval = setInterval(() => {
        updateCountdown(phases[currentPhase].duration, phaseStartTime);
      }, 100);

      phaseTimeout = setTimeout(() => {
        clearInterval(countdownInterval);
        currentPhase++;
        runPhase();
      }, remainingPhaseTime);
    }

    function finishSession() {
      isRunning = false;
      isPaused = false;
      clearInterval(countdownInterval);
      clearTimeout(phaseTimeout);
      clearAllAnimations();
      breathLabel.textContent = '完成';
      timer.textContent = '--';
      progressFill.style.width = '100%';
      cycleInfo.textContent = `已完成 ${totalCycles} 次`;
      actionBtn.textContent = '开始';
      actionBtn.classList.remove('btn-pause');
      actionBtn.classList.add('btn-start');
      cycleSelect.disabled = false;
    }

    function resetSession() {
      isRunning = false;
      isPaused = false;
      clearInterval(countdownInterval);
      clearTimeout(phaseTimeout);
      clearAllAnimations();
      breathLabel.textContent = '准备';
      timer.textContent = '--';
      progressFill.style.width = '0%';
      cycleInfo.textContent = '';
      actionBtn.textContent = '开始';
      actionBtn.classList.remove('btn-pause');
      actionBtn.classList.add('btn-start');
      cycleSelect.disabled = false;
    }

    actionBtn.addEventListener('click', () => {
      if (!isRunning) {
        startSession();
      } else if (isPaused) {
        resumeSession();
      } else {
        pauseSession();
      }
    });

    // 键盘快捷键：空格键暂停/继续，Esc 重置
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        actionBtn.click();
      }
      if (e.code === 'Escape' && isRunning) {
        if (confirm('确定要结束当前练习吗？')) {
          resetSession();
        }
      }
    });
  </script>
</body>
</html>
