<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>颈部放松 - Healthy Breath</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-body">
  <nav class="navbar">
    <div class="navbar-left">
      <a href="../index.html" class="nav-back">&#8592;</a>
      <span class="nav-title">颈部放松</span>
    </div>
    <a href="../index.html" class="nav-home-link">主页</a>
  </nav>

  <div class="page-content">
    <h1 class="page-title">颈部放松</h1>
    <p class="page-subtitle">缓解久坐导致的颈部僵硬</p>
    <p class="page-desc">长时间低头看屏幕会导致颈椎前伸，这组动作能恢复颈部活动度，缓解肌肉紧张。</p>

    <div class="exercise-area">
      <div class="neck-figure">
        <div class="neck-head" id="neckHead"></div>
        <div class="neck-body-line"></div>
      </div>

      <div class="exercise-guide-text" id="guideText">准备好后，点击开始</div>
      <div class="exercise-timer" id="timer">5</div>

      <div class="phase-dots" id="phaseDots">
        <div class="phase-dot"></div><div class="phase-dot"></div><div class="phase-dot"></div>
        <div class="phase-dot"></div><div class="phase-dot"></div>
      </div>

      <div class="controls">
        <button class="btn btn-start" id="actionBtn">开始</button>
      </div>
    </div>

    <div class="instruction-card">
      <h3>动作顺序</h3>
      <div class="breath-flow">
        <div class="flow-step"><div class="step-icon">前</div><div class="step-name">5秒</div></div>
        <div class="flow-arrow">&#8594;</div>
        <div class="flow-step"><div class="step-icon">后</div><div class="step-name">5秒</div></div>
        <div class="flow-arrow">&#8594;</div>
        <div class="flow-step"><div class="step-icon">左</div><div class="step-name">5秒</div></div>
        <div class="flow-arrow">&#8594;</div>
        <div class="flow-step"><div class="step-icon">右</div><div class="step-name">5秒</div></div>
        <div class="flow-arrow">&#8594;</div>
        <div class="flow-step"><div class="step-icon">圈</div><div class="step-name">10秒</div></div>
      </div>
    </div>
  </div>

  <script>
    const neckHead = document.getElementById('neckHead');
    const guideText = document.getElementById('guideText');
    const timer = document.getElementById('timer');
    const actionBtn = document.getElementById('actionBtn');
    const phaseDots = document.querySelectorAll('#phaseDots .phase-dot');

    const STEPS = [
      { name: '缓慢低下头，下巴靠近胸口', class: 'tilt-forward', duration: 5000 },
      { name: '缓慢抬起头，看向天花板', class: 'tilt-back', duration: 5000 },
      { name: '头向左侧倾斜，左耳靠近左肩', class: 'tilt-left', duration: 5000 },
      { name: '头向右侧倾斜，右耳靠近右肩', class: 'tilt-right', duration: 5000 },
      { name: '头部缓慢画圈', class: 'circle', duration: 10000 }
    ];

    let isRunning = false;
    let isPaused = false;
    let currentStep = 0;
    let countdown = 0;
    let stepTimer = null;
    let countdownInterval = null;
    let remainingTime = 0;

    function updateDots() {
      phaseDots.forEach((dot, i) => {
        dot.classList.remove('active', 'completed');
        if (i < currentStep) dot.classList.add('completed');
        else if (i === currentStep) dot.classList.add('active');
      });
    }

    function clearHeadClass() {
      ['tilt-left','tilt-right','tilt-forward','tilt-back','circle'].forEach(c => neckHead.classList.remove(c));
    }

    function runStep() {
      if (!isRunning || isPaused) return;
      if (currentStep >= STEPS.length) {
        finish();
        return;
      }
      const step = STEPS[currentStep];
      clearHeadClass();
      neckHead.classList.add(step.class);
      guideText.textContent = step.name;
      countdown = Math.ceil(step.duration / 1000);
      timer.textContent = countdown;
      updateDots();

      const startTime = Date.now();
      countdownInterval = setInterval(() => {
        const elapsed = Date.now() - startTime;
        const remaining = Math.max(0, Math.ceil((step.duration - elapsed) / 1000));
        timer.textContent = remaining;
      }, 200);

      stepTimer = setTimeout(() => {
        clearInterval(countdownInterval);
        currentStep++;
        runStep();
      }, step.duration);
    }

    function start() {
      isRunning = true;
      isPaused = false;
      currentStep = 0;
      actionBtn.textContent = '暂停';
      actionBtn.classList.remove('btn-start', 'btn-restart');
      actionBtn.classList.add('btn-pause');
      runStep();
    }

    function pause() {
      isPaused = true;
      clearInterval(countdownInterval);
      clearTimeout(stepTimer);
      const step = STEPS[currentStep];
      const elapsed = step.duration - (countdown * 1000);
      remainingTime = step.duration - elapsed;
      guideText.textContent = '已暂停';
      actionBtn.textContent = '继续';
      actionBtn.classList.remove('btn-pause');
      actionBtn.classList.add('btn-start');
    }

    function resume() {
      isPaused = false;
      actionBtn.textContent = '暂停';
      actionBtn.classList.remove('btn-start');
      actionBtn.classList.add('btn-pause');
      guideText.textContent = STEPS[currentStep].name;
      neckHead.classList.add(STEPS[currentStep].class);

      const startTime = Date.now() - (STEPS[currentStep].duration - remainingTime);
      countdownInterval = setInterval(() => {
        const elapsed = Date.now() - startTime;
        const remaining = Math.max(0, Math.ceil((STEPS[currentStep].duration - elapsed) / 1000));
        timer.textContent = remaining;
      }, 200);

      stepTimer = setTimeout(() => {
        clearInterval(countdownInterval);
        currentStep++;
        runStep();
      }, remainingTime);
    }

    function finish() {
      isRunning = false;
      clearHeadClass();
      guideText.textContent = '完成！颈部已放松';
      timer.textContent = '--';
      phaseDots.forEach(d => d.classList.remove('active', 'completed'));
      actionBtn.textContent = '再来一次';
      actionBtn.classList.remove('btn-pause');
      actionBtn.classList.add('btn-restart');
    }

    actionBtn.addEventListener('click', () => {
      const text = actionBtn.textContent;
      if (text === '开始' || text === '再来一次') start();
      else if (text === '暂停') pause();
      else if (text === '继续') resume();
    });
  </script>
</body>
</html>
