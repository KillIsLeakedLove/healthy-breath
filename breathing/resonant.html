<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>共振呼吸 - Healthy Breath</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .breath-circle.inhale-r { animation: inhale 5s ease-in-out forwards; }
    .breath-circle.hold-r { animation: hold 5s linear forwards; }
    .breath-circle.exhale-r { animation: exhale 5s ease-in-out forwards; }
    .breath-circle.hold-empty-r { animation: holdEmpty 5s linear forwards; }
  </style>
</head>
<body class="page-body">
  <nav class="navbar">
    <div class="navbar-left">
      <a href="../index.html" class="nav-back">&#8592;</a>
      <span class="nav-title">共振呼吸</span>
    </div>
    <a href="../index.html" class="nav-home-link">主页</a>
  </nav>

  <div class="page-content">
    <h1 class="page-title">共振呼吸</h1>
    <p class="page-subtitle">5-5-5-5 &#183; 平衡自主神经</p>
    <p class="page-desc">又称连贯呼吸。每分钟约 6 次的呼吸频率能与心脏节律共振，降低压力荷尔蒙，提升 HRV（心率变异性）。</p>

    <div class="breath-stage">
      <svg class="ring-track" viewBox="0 0 280 280">
        <circle cx="140" cy="140" r="135"/>
        <defs>
          <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4a7a5a"/>
            <stop offset="100%" stop-color="#6a9a7a"/>
          </linearGradient>
        </defs>
      </svg>
      <svg class="ring-progress" viewBox="0 0 280 280">
        <circle cx="140" cy="140" r="135"/>
      </svg>
      <div class="breath-circle" id="breathCircle"></div>
      <div class="breath-label" id="breathLabel">准备</div>
    </div>

    <div class="timer" id="timer">--</div>

    <div class="phase-dots">
      <div class="phase-dot"></div>
      <div class="phase-dot"></div>
      <div class="phase-dot"></div>
      <div class="phase-dot"></div>
    </div>

    <div class="controls">
      <div class="settings-row">
        <div class="setting-item">
          <label for="cycleSelect">循环</label>
          <select id="cycleSelect">
            <option value="3">3 次</option>
            <option value="5" selected>5 次</option>
            <option value="10">10 次</option>
            <option value="15">15 次</option>
            <option value="20">20 次</option>
            <option value="999">无限</option>
          </select>
        </div>
        <div class="setting-item">
          <label class="toggle-sound">
            <input type="checkbox" id="soundToggle" checked>
            <span>音效</span>
          </label>
        </div>
      </div>
      <button class="btn btn-start" id="actionBtn">开始</button>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="elapsedStat">00:00</div>
        <div class="stat-label">已用时</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="cycleInfo">-</div>
        <div class="stat-label">进度</div>
      </div>
    </div>

    <div class="instruction-card">
      <h3>共振呼吸 (5-5-5-5)</h3>
      <div class="breath-flow">
        <div class="flow-step"><div class="step-icon">吸</div><div class="step-name">5秒</div></div>
        <div class="flow-arrow">&#8594;</div>
        <div class="flow-step"><div class="step-icon">屏</div><div class="step-name">5秒</div></div>
        <div class="flow-arrow">&#8594;</div>
        <div class="flow-step"><div class="step-icon">呼</div><div class="step-name">5秒</div></div>
        <div class="flow-arrow">&#8594;</div>
        <div class="flow-step"><div class="step-icon">屏</div><div class="step-name">5秒</div></div>
      </div>
    </div>
  </div>

  <div class="celebration" id="celebration"></div>

  <script src="../js/breathing.js"></script>
  <script>
    const BREATH_CONFIG = {
      phases: [
        { name: '吸气', class: 'inhale-r', duration: 5000 },
        { name: '屏息', class: 'hold-r', duration: 5000 },
        { name: '呼气', class: 'exhale-r', duration: 5000 },
        { name: '屏息', class: 'hold-empty-r', duration: 5000 }
      ]
    };
    initBreathing(BREATH_CONFIG);
  </script>
</body>
</html>
