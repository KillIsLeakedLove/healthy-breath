<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>相等呼吸 - Healthy Breath</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-body">
  <nav class="navbar">
    <div class="navbar-left">
      <a href="../index.html" class="nav-back">&#8592;</a>
      <span class="nav-title">相等呼吸</span>
    </div>
    <a href="../index.html" class="nav-home-link">主页</a>
  </nav>

  <div class="page-content">
    <h1 class="page-title">相等呼吸</h1>
    <p class="page-subtitle">4-4 &#183; 简单平衡，随时可做</p>
    <p class="page-desc">瑜伽中的 Sama Vritti 技巧。吸气和呼气等长，是最简单的呼吸练习，适合初学者和办公室随时进行。</p>

    <div class="breath-stage">
      <svg class="ring-track" viewBox="0 0 280 280">
        <circle cx="140" cy="140" r="135"/>
        <defs>
          <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4a7a5a"/>
            <stop offset="100%" stop-color="#6a9a7a"/>
          </linearGradient>
        </defs>
      </svg>
      <svg class="ring-progress" viewBox="0 0 280 280">
        <circle cx="140" cy="140" r="135"/>
      </svg>
      <div class="breath-circle" id="breathCircle"></div>
      <div class="breath-label" id="breathLabel">准备</div>
    </div>

    <div class="timer" id="timer">--</div>

    <div class="phase-dots">
      <div class="phase-dot"></div>
      <div class="phase-dot"></div>
    </div>

    <div class="controls">
      <div class="settings-row">
        <div class="setting-item">
          <label for="cycleSelect">循环</label>
          <select id="cycleSelect">
            <option value="5">5 次</option>
            <option value="10" selected>10 次</option>
            <option value="20">20 次</option>
            <option value="30">30 次</option>
            <option value="50">50 次</option>
            <option value="999">无限</option>
          </select>
        </div>
        <div class="setting-item">
          <label class="toggle-sound">
            <input type="checkbox" id="soundToggle" checked>
            <span>音效</span>
          </label>
        </div>
      </div>
      <button class="btn btn-start" id="actionBtn">开始</button>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="elapsedStat">00:00</div>
        <div class="stat-label">已用时</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="cycleInfo">-</div>
        <div class="stat-label">进度</div>
      </div>
    </div>

    <div class="instruction-card">
      <h3>相等呼吸 (4-4)</h3>
      <div class="breath-flow">
        <div class="flow-step"><div class="step-icon">吸</div><div class="step-name">4秒</div></div>
        <div class="flow-arrow">&#8594;</div>
        <div class="flow-step"><div class="step-icon">呼</div><div class="step-name">4秒</div></div>
      </div>
    </div>
  </div>

  <div class="celebration" id="celebration"></div>

  <script src="../js/breathing.js"></script>
  <script>
    const BREATH_CONFIG = {
      phases: [
        { name: '吸气', class: 'inhale', duration: 4000 },
        { name: '呼气', class: 'exhale', duration: 4000 }
      ]
    };
    initBreathing(BREATH_CONFIG);
  </script>
</body>
</html>
